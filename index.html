<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="unit-converter">
      <div class="unit-input">
        <h2 id="input-titel">Metric/Imperial Unit Conversion</h2>
        <input id="input-feld" type="text" /> <br />
        <button id="input-btn">convert</button>
      </div>
      <div class="unit-output">
        <div class="output-length">
          <h3 class="output-titel">length (Meter/Feet)</h3>
          <p id="length-result"></p>
        </div>
        <div class="output-volume">
          <h3 class="output-titel">Volume (Liters/Gallons)</h3>
          <p id="volume-result"></p>
        </div>
        <div class="output-mass">
          <h3 class="output-titel">length (Kilograms/Pounds)</h3>
          <p id="mass-result"></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
